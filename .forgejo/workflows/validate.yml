name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: codeberg-tiny

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Create virtual environment
        run: |
          python -m venv .venv-ci
          .venv-ci/bin/python -m pip install --upgrade pip
          .venv-ci/bin/python -m pip install PyYAML jsonschema rdflib

      - name: Run validation
        run: |
          PATH="$PWD/.venv-ci/bin:$PATH" ./scripts/validate-local.sh
