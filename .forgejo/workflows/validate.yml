name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: codeberg-tiny

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up Python dependencies
        run: |
          python -m pip install PyYAML jsonschema rdflib

      - name: Run validation
        run: ./scripts/validate-local.sh
